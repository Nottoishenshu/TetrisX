<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TetrisX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header>
      <h1>TetrisX</h1>
      <p>Classic block puzzle in the browser.</p>
    </header>

    <main class="game-layout">
      <section class="game-panel">
        <div class="canvas-shell">
          <canvas id="game" width="300" height="600"></canvas>
          <div class="overlay" id="overlay">Press Start to play</div>
        </div>

        <div class="controls">
          <button id="startButton">Start Game</button>
          <button id="restartButton">Restart</button>
        </div>
      </section>

      <aside class="info-panel">
        <div class="stat-card">
          <h2>Score</h2>
          <div id="scoreValue">0</div>
        </div>
        <div class="stat-card">
          <h2>Lines</h2>
          <div id="linesValue">0</div>
        </div>
        <div class="preview-card">
          <h2>Next</h2>
          <canvas id="next" width="150" height="150"></canvas>
        </div>
        <div class="instructions">
          <h2>Controls</h2>
          <p>← → : Move</p>
          <p>↑ / W / X : Rotate</p>
          <p>↓ : Soft drop</p>
          <p>Space : Hard drop</p>
        </div>
      </aside>
    </main>

    <footer>
      <p>Open this folder in VS Code and use Live Server to host it publicly.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
